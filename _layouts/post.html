---
layout: default
---

<article class="post">
  <header class="post__header">
    <h1>{{ page.title }}</h1>
    {%- if page.date -%}
      <p class="post__meta">{{ page.date | date: "%b %d, %Y" }}</p>
    {%- endif -%}
  </header>

  <div class="post__content">
    {{ content }}
  </div>
</article>
