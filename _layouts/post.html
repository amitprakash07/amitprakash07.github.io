---
layout: default
---

<article class="post">
  <header class="post__header">
    <h1>{{ page.title }}</h1>
    {%- if page.date -%}
      <p class="post__meta">{{ page.date | date: "%b %d, %Y" }}</p>
    {%- endif -%}
  </header>

  <div class="post__content">
    {% if page.source_wix and page.categories contains 'game-engineering' %}
    <p class="post__wix-origin">Older write-up with figures: <a href="{{ page.source_wix }}">original post on Wix</a>.</p>
    {% endif %}
    {{ content }}
  </div>
</article>
