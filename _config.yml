title: Amit Prakash
description: Portfolio, blog, and notes
url: ""
baseurl: ""

markdown: kramdown
# :categories comes from the folder under _posts/ (e.g. game-engineering, game-projects)
permalink: /blogs/:categories/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "portfolio"
    values:
      layout: page
  - scope:
      path: "toastmasters"
    values:
      layout: page
  - scope:
      type: "posts"
    values:
      layout: post

exclude:
  - README.md
  - _archive
