title: Amit Prakash
description: Portfolio, blog, and notes
url: ""
baseurl: ""

markdown: kramdown

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "portfolio"
    values:
      layout: page
  - scope:
      path: "toastmasters"
    values:
      layout: page
  # :categories = folder under _posts/ (e.g. game-engineering, game-projects). Posts only — do not set this as a global permalink or normal pages (e.g. blogs/index) break.
  - scope:
      type: "posts"
    values:
      layout: post
      permalink: /blogs/:categories/:year/:month/:day/:title/

exclude:
  - README.md
  - _archive
