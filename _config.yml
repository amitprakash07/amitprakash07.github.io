title: Amit Prakash
description: Portfolio, blog, and notes
url: ""
baseurl: ""

# Append to stylesheet URL so browsers/CDN pick up CSS changes after deploy (bump when you edit style.css).
assets_css_version: "6"

markdown: kramdown

# Syntax-colored fenced code blocks (```cpp, etc.) — supported on GitHub Pages via Rouge.
kramdown:
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "portfolio"
    values:
      layout: page
  - scope:
      path: "toastmasters"
    values:
      layout: page
  # Posts:
  # - We set `permalink` only for posts (never globally), otherwise normal pages like `/blogs/` break.
  # - `:categories` comes from the post's `categories` value (not the folder name), so we set categories via folder-scoped defaults below.
  - scope:
      type: "posts"
    values:
      layout: post
      permalink: /blogs/:categories/:year/:month/:day/:title/
  - scope:
      path: "_posts/game-engineering"
      type: "posts"
    values:
      categories:
        - game-engineering
  - scope:
      path: "_posts/game-projects"
      type: "posts"
    values:
      categories:
        - game-projects
  # CPU rasterizer series: original writing (not coursework / Wix archive).
  - scope:
      path: "_posts/computer-graphics/cpu-rasterizer"
      type: "posts"
    values:
      categories:
        - computer-graphics
        - personal-project
        - cpu-rasterizer
  - scope:
      path: "_posts/computer-graphics"
      type: "posts"
    values:
      categories:
        - computer-graphics
  - scope:
      path: "_posts/ray-tracing"
      type: "posts"
    values:
      categories:
        - ray-tracing

exclude:
  - README.md
  - _archive
